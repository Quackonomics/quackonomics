<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title }} — {{ site.name }}</title>
    <!-- Google Fonts Imports -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Atkinson+Hyperlegible:ital,wght@0,400;0,700;1,400;1,700&family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="{{ '/style.css' | relative_url }}">
</head>
<body>

    <header class="bayer-header">
        <div class="header-content">
            <h1><a href="/" style="color: #FFFFFF; border: none;">{{ site.name }}</a></h1>
            <p>{{ site.description }}</p>
        </div>
    </header>

    <div class="container">
        <main>
            {{ content }}
        </main>

<aside>
            <h3>It's not my fault</h3>
            <p>So I can't apologize</p>
            
            <h3>RECENT HUMAN-SLOP</h3>
            <ul style="margin-bottom: 25px;">
                <!-- Jekyll dynamically pulls the 5 most recent posts here -->
                {% for post in site.posts limit:5 %}
                <li style="line-height: 1.3; margin-bottom: 12px;">
                    <a href="{{ post.url | relative_url }}" style="font-size: 0.9rem;">{{ post.title }}</a>
                </li>
                {% endfor %}
            </ul>

            <h3>LINKS</h3>
            <ul>
                <li><a href="/">Index</a></li>
                <li><a href="https://github.com/{{ site.github_username }}">GitHub</a></li>
            </ul>
        </aside>
    </div>

    <footer>
        <p>&copy; {{ 'now' | date: "%Y" }} — Statically Compiled.</p>
    </footer>

</body>
</html>
